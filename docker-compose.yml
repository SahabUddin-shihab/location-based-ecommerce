version: "3.8"

services:
  app:
    build: .
    container_name: location_app
    ports:
      - "8000:5000"
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - DATABASE_URL=mongodb://mongo:27017/location_based_ecommerce
      - NODE_ENV=development
      - CLIENT_URL=http://localhost:3000
    volumes:
      - .:/app
    command: npm start

  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: